<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Live Crypto Bot - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; --soon: #555; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* HEADER */
        .header { 
            position: fixed; top: 0; width: 100%; height: 75px; 
            background: var(--card-dark); display: flex; align-items: center; 
            padding: 0 20px; box-sizing: border-box; z-index: 3000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            justify-content: space-between;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: var(--card-dark); z-index: 5000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--gold); overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        
        .sidebar-item {
            padding: 14px 25px; display: flex; align-items: center;
            text-decoration: none; color: var(--text);
            border-bottom: 1px solid rgba(255,255,255,0.03); transition: 0.2s;
        }
        .sidebar-item i { margin-right: 15px; color: var(--gold); width: 20px; font-size: 18px; }
        
        /* BADGE SOON */
        .soon-badge { 
            background: var(--soon); color: #fff; font-size: 9px; 
            padding: 2px 6px; border-radius: 4px; margin-left: auto; 
            font-weight: bold; border: 1px solid #777;
        }

        /* CONTENT */
        .container { margin-top: 95px; padding: 15px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .balance-card { 
            background: linear-gradient(135deg, #112240 0%, #1a3060 100%); 
            padding: 30px 20px; border-radius: 20px; text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.3); margin-bottom: 25px;
        }

        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-item { 
            background: var(--card-dark); padding: 20px; border-radius: 15px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none; color: var(--text); transition: 0.3s;
        }
        .grid-item i { font-size: 24px; color: var(--gold); margin-bottom: 10px; }
        .grid-item.disabled { opacity: 0.6; pointer-events: none; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 4500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div onclick="toggleMenu()" style="cursor:pointer; padding: 10px;">
            <i class="fas fa-bars" style="font-size: 24px; color: var(--gold);"></i>
        </div>
        <div style="text-align: center; flex-grow: 1;">
            <div style="font-weight: 900; color: var(--gold); letter-spacing: 1px; font-size: 18px;">LIVE CRYPTO BOT</div>
            <div style="font-size: 10px; color: var(--gold); font-weight: bold;">1 USDT = 145.00 HTG</div>
        </div>
        <div style="background: var(--gold); color: black; padding: 5px 10px; border-radius: 8px; font-weight: bold;">BK</div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div style="color: var(--gold); font-size: 20px; font-weight: 800;">@kerby</div>
            <div style="font-size: 14px; opacity: 0.6;">ID: BK-2026</div>
        </div>
        
        <a href="index.html" class="sidebar-item"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="kat.html" class="sidebar-item"><i class="fas fa-credit-card"></i> Cartes Virtuelles</a>
        <a href="depot.html" class="sidebar-item"><i class="fas fa-arrow-down"></i> Dépôt</a>
        <a href="retrait.html" class="sidebar-item"><i class="fas fa-arrow-up"></i> Retrait</a>
        
        <div class="sidebar-item" style="opacity: 0.5; cursor: not-allowed;">
            <i class="fas fa-shopping-bag"></i> Boutique <span class="soon-badge">SOON</span>
        </div>
        <div class="sidebar-item" style="opacity: 0.5; cursor: not-allowed;">
            <i class="fas fa-chart-line"></i> Investissements <span class="soon-badge">SOON</span>
        </div>

        <a href="support.html" class="sidebar-item"><i class="fas fa-headset"></i> Support Client</a>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="container">
        <div class="balance-card">
            <small style="color: var(--gold); letter-spacing: 2px; font-weight: bold;">SOLDE TOTAL</small>
            <h1 id="balansHTG" style="margin: 10px 0; font-size: 35px;">0.00 HTG</h1>
            <div id="balansUSDT" style="font-weight: bold; opacity: 0.8; font-size: 18px; color: var(--gold);">0.00 USDT</div>
        </div>

        <div class="grid-menu">
            <a href="kat.html" class="grid-item">
                <i class="fas fa-credit-card"></i><br>
                <small>Cartes Virtuelles</small>
            </a>
            <a href="#" class="grid-item disabled">
                <i class="fas fa-shopping-bag"></i><br>
                <small style="color: #777;">Boutique (Soon)</small>
            </a>
            <a href="depot.html" class="grid-item">
                <i class="fas fa-plus-circle"></i><br>
                <small>Dépôt</small>
            </a>
            <a href="retrait.html" class="grid-item">
                <i class="fas fa-minus-circle"></i><br>
                <small>Retrait</small>
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkfT1FJmi0CM8jjs7xFhnjMrgW3yWXkpE",
            authDomain: "live-crypto-bot.firebaseapp.com",
            projectId: "live-crypto-bot",
            storageBucket: "live-crypto-bot.firebasestorage.app",
            messagingSenderId: "583419008753",
            appId: "1:583419008753:web:f4b8389ace26d7e5bf7b50"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userID = "BK-2026"; 

        onValue(ref(db, 'users/' + userID), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('balansHTG').innerText = (data.balanceHTG || 0).toFixed(2) + " HTG";
                document.getElementById('balansUSDT').innerText = (data.balanceUSDT || 0).toFixed(2) + " USDT";
            }
        });
    </script>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
    </script>
</body>
</html>
