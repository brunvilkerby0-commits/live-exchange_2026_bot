<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; }
        body { background: var(--navy); color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        /* KAT LA SENP */
        .card-view { 
            width: 100%; max-width: 350px; height: 200px; 
            background: linear-gradient(135deg, #1a3060, #0a192f); 
            border-radius: 15px; border: 1px solid var(--gold); 
            margin: 0 auto 20px auto; padding: 20px; 
            box-sizing: border-box; text-align: left;
        }

        /* BOUTON YO SEPARE */
        .action-area { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .btn-eye-action { 
            background: none; border: 1px solid var(--gold); color: var(--gold); 
            padding: 10px; border-radius: 8px; cursor: pointer; width: 100%;
        }

        .price-display { font-size: 35px; color: var(--gold); font-weight: bold; margin: 15px 0; }

        select, input { 
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--gold); 
            background: var(--card-dark); color: white; margin-bottom: 10px;
        }

        .btn-pay { 
            background: var(--gold); color: black; border: none; 
            padding: 20px; border-radius: 10px; font-weight: bold; 
            font-size: 18px; cursor: pointer; width: 100%;
        }

        /* MODAL SENP */
        #myModal { 
            display: none; position: fixed; z-index: 10000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center;
        }
        .modal-box { background: var(--navy); padding: 30px; border: 2px solid var(--gold); border-radius: 15px; width: 80%; }
    </style>
</head>
<body>

    <h2 style="color:var(--gold)">LIVE CRYPTO BOT</h2>

    <div class="card-view" id="mainCard">
        <div style="display:flex; justify-content:space-between"><strong>VISA</strong> <i class="fab fa-cc-visa" style="font-size:30px"></i></div>
        <div id="numCard" style="font-size:22px; margin:25px 0; letter-spacing:2px">**** **** **** ****</div>
        <div style="display:flex; justify-content:space-between">
            <span id="nameLabel">VOTRE NOM</span>
            <span>CVV: <b id="cvvCard">***</b></span>
        </div>
    </div>

    <button class="btn-eye-action" onclick="toggleSecret()">
        <i class="fas fa-eye"></i> MONTRE / KACHE ENFÒMASYON
    </button>

    <div class="price-display" id="finalPrice">$11.00</div>

    <div class="action-area">
        <input type="text" id="inputName" placeholder="NON SOU KAT LA" oninput="updateCardName()">
        
        <select id="selectLevel" onchange="changeStyle()">
            <option value="11">Visa Classic ($11)</option>
            <option value="25">Visa Gold ($25)</option>
            <option value="30">Visa Black ($30)</option>
        </select>

        <button class="btn-pay" onclick="openPopUp()">COMMANDER MAINTENANT</button>
    </div>

    <div id="myModal">
        <div class="modal-box">
            <h3>Konfime Acha</h3>
            <p>Ou pral peye <span id="popPrice">$11.00</span></p>
            <button class="btn-pay" onclick="alert('Lojik Firebase la ap travay!')">OK, PAYER</button>
            <button class="btn-pay" style="background:red; color:white; margin-top:10px" onclick="closePopUp()">ANNULER</button>
        </div>
    </div>

    <script>
        let isSecretOpen = false;
        
        function toggleSecret() {
            isSecretOpen = !isSecretOpen;
            document.getElementById('numCard').innerText = isSecretOpen ? "4532 8810 0021 9945" : "**** **** **** ****";
            document.getElementById('cvvCard').innerText = isSecretOpen ? "771" : "***";
        }

        function updateCardName() {
            let n = document.getElementById('inputName').value;
            document.getElementById('nameLabel').innerText = n.toUpperCase() || "VOTRE NOM";
        }

        function changeStyle() {
            let v = document.getElementById('selectLevel').value;
            document.getElementById('finalPrice').innerText = "$" + v + ".00";
            let c = document.getElementById('mainCard');
            if(v == "25") c.style.background = "linear-gradient(135deg, #d4af37, #8a6d3b)";
            else if(v == "30") c.style.background = "black";
            else c.style.background = "linear-gradient(135deg, #1a3060, #0a192f)";
        }

        function openPopUp() {
            document.getElementById('popPrice').innerText = "$" + document.getElementById('selectLevel').value + ".00";
            document.getElementById('myModal').style.display = "flex";
        }

        function closePopUp() {
            document.getElementById('myModal').style.display = "none";
        }
    </script>
</body>
</html>
