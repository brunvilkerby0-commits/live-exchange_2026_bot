<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Sèvis Kat - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .container { max-width: 450px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 25px; }
        h2 { color: var(--gold); text-transform: uppercase; font-size: 18px; }

        /* VIZYÈL KAT LA */
        .card-preview {
            width: 100%; height: 200px; background: linear-gradient(135deg, #1a2a44, #112240);
            border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3);
            position: relative; padding: 25px; box-sizing: border-box; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .chip { width: 40px; height: 30px; background: var(--gold); border-radius: 5px; opacity: 0.8; margin-bottom: 20px; }
        .temp-number { font-size: 18px; letter-spacing: 2px; color: white; opacity: 0.5; }
        .visa-logo { position: absolute; bottom: 20px; right: 25px; font-weight: bold; font-style: italic; font-size: 22px; }

        /* BLÒK ENFÒMASYON */
        .info-box { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .price-tag { font-size: 24px; color: var(--gold); font-weight: bold; text-align: center; margin-bottom: 10px; }
        
        /* FÒMILÈ (KACHE PA DEFO) */
        #form-section { display: none; margin-top: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--gold); margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: var(--navy); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; color: white; outline: none; box-sizing: border-box; }

        /* BOUTON */
        .btn-main {
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-size: 14px; text-transform: uppercase;
        }
        .btn-buy { background: var(--gold); color: var(--navy); }
        .btn-submit { background: #2ecc71; color: white; margin-top: 10px; }
        
        .back-link { display: block; text-align: center; margin-top: 25px; color: var(--text); text-decoration: none; font-size: 13px; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Achat de Carte Virtuelle</h2>
    </div>

    <div class="card-preview">
        <div class="chip"></div>
        <div class="temp-number" id="card-display-name">CARTE PERSONNELLE</div>
        <div class="visa-logo">VISA</div>
    </div>

    <div id="payment-section" class="info-box">
        <div class="price-tag">5.00 USDT</div>
        <p style="font-size: 12px; text-align: center; opacity: 0.8;">Frais de création et activation BridgeCard.</p>
        <button class="btn-main btn-buy" onclick="showForm()">ACHETER LA CARTE</button>
    </div>

    <div id="form-section" class="info-box">
        <h3 style="color: var(--gold); font-size: 14px; text-align: center; margin-top: 0;">INFORMATIONS DE LA CARTE</h3>
        
        <div class="input-group">
            <label>NOM COMPLET (JANL SOU ID W)</label>
            <input type="text" id="full-name" placeholder="Ex: Brunvil Kerby">
        </div>

        <div class="input-group">
            <label>ADRÈS EMAIL (POU ACTIVATION)</label>
            <input type="email" id="email" placeholder="votre@email.com">
        </div>

        <div class="input-group">
            <label>ADRESSE DE FACTURATION (BILLING)</label>
            <input type="text" placeholder="Numéro, Rue, Ville, Pays">
        </div>

        <button class="btn-main btn-submit" onclick="submitOrder()">ENVOYER LES DÉTAILS</button>
    </div>

    <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour au Dashboard</a>
</div>

<script>
    // 1. Lè kliyan an klike sou Achte
    function showForm() {
        if(confirm("Voulez-vous payer 5.00 USDT pour cette carte ?")) {
            document.getElementById('payment-section').style.display = 'none';
            document.getElementById('form-section').style.display = 'block';
            alert("Paiement réussi ! Tanpri ranpli enfòmasyon ou yo.");
        }
    }

    // 2. Lè li fin bay enfòmasyon li
    function submitOrder() {
        const name = document.getElementById('full-name').value;
        if(name === "") {
            alert("Tanpri mete non ou.");
            return;
        }
        alert("Enfòmasyon voye bay Admin! Kat ou ap aktive ak non: " + name);
        window.location.href = "dashboard.html";
    }
</script>

</body>
</html>
