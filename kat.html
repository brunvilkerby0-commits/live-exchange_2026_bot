<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Live Crypto Bot - Cartes Virtuelles</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .header { padding: 20px; display: flex; align-items: center; background: var(--card-dark); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .header a { color: var(--gold); text-decoration: none; margin-right: 20px; font-size: 20px; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        .card-container { width: 100%; height: 210px; perspective: 1000px; margin-bottom: 25px; position: relative; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-inner.flipped { transform: rotateY(180deg); }
        
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 18px; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 1px solid rgba(212, 175, 55, 0.3); }
        .card-front { background: linear-gradient(135deg, #1a3060 0%, #0a192f 100%); cursor: pointer; }
        .card-back { background: #1a1a1a; transform: rotateY(180deg); color: white; cursor: pointer; }
        
        .eye-btn { position: absolute; top: 15px; right: 15px; color: var(--gold); z-index: 999; font-size: 24px; cursor: pointer; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        
        .chip { width: 45px; height: 35px; background: linear-gradient(135deg, #e0e0e0, #888); border-radius: 6px; }
        .cvv-box { background: #fff; color: #000; padding: 8px; text-align: center; width: 55px; margin-left: auto; font-weight: bold; border-radius: 4px; font-family: monospace; }
        .price-tag { background: rgba(212, 175, 55, 0.05); border: 2px solid var(--gold); padding: 20px; border-radius: 15px; text-align: center; margin: 20px 0; }
        
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; }
        input, select { width: 100%; padding: 15px; background: var(--card-dark); border: 1px solid rgba(212, 175, 55, 0.2); color: white; border-radius: 12px; margin-bottom: 20px; box-sizing: border-box; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 3000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-dark); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html"><i class="fas fa-arrow-left"></i></a>
        <div style="font-weight: 800; letter-spacing: 1px;">CARTES VIRTUELLES</div>
    </div>

    <div class="container">
        <div class="card-container">
            <div class="eye-btn" onclick="toggleSecurity(event)">
                <i id="eyeIcon" class="fas fa-eye"></i>
            </div>
            
            <div class="card-inner" id="cardInner" onclick="flipCard()">
                <div class="card-front" id="cardFront">
                    <div style="display: flex; justify-content: space-between;"><div class="chip"></div><i class="fab fa-cc-visa" style="font-size: 40px;"></i></div>
                    <div id="cardNum" style="font-size: 22px; letter-spacing: 3px; font-family: monospace; margin: 20px 0;">**** **** **** ****</div>
                    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                        <div><div style="font-size: 9px; opacity: 0.6;">NOM DU TITULAIRE</div><div id="displayName" style="font-weight: bold;">VOTRE NOM</div></div>
                        <div style="text-align: right;"><div style="font-size: 9px; opacity: 0.6;">EXP</div><div style="font-weight: bold;">12/28</div></div>
                    </div>
                </div>
                <div class="card-back">
                    <div style="background: #000; width: 110%; height: 40px; margin-left: -25px;"></div>
                    <div style="padding: 10px;"><small>CVV</small><div class="cvv-box" id="cvvValue">***</div></div>
                </div>
            </div>
        </div>

        <div class="price-tag">
            <strong style="font-size: 32px; color: var(--gold);" id="mainPrice">$11.00</strong>
        </div>

        <label>NOM SUR LA CARTE</label>
        <input type="text" id="cardName" oninput="updateName()" placeholder="Entrez votre nom">

        <label>NIVEAU</label>
        <select id="cardSelect" onchange="updateUI()">
            <option value="11">Visa Classic ($11)</option>
            <option value="25">Visa Gold ($25)</option>
            <option value="30">Visa Black ($30)</option>
        </select>

        <button class="btn-gold" id="btnCommander" onclick="openOrder()">COMMANDER MAINTENANT</button>
    </div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h3>Confirmer l'achat</h3>
            <p>Payer <strong id="modalPrice">$11.00</strong> ?</p>
            <button class="btn-gold" onclick="alert('Lojik la bon! Kòb ap dekoupe.')">PAYER MAINTENANT</button>
            <button class="btn-gold" style="background:none; color:red;" onclick="closeOrder()">ANNULER</button>
        </div>
    </div>

    <script>
        let isVisible = false;
        let randomCVV = Math.floor(100 + Math.random() * 900);

        function flipCard() { 
            document.getElementById('cardInner').classList.toggle('flipped'); 
        }

        function toggleSecurity(event) {
            event.stopPropagation(); // Sa anpeche kat la vire lè w peze Je a
            isVisible = !isVisible;
            document.getElementById('eyeIcon').classList.toggle('fa-eye-slash');
            document.getElementById('cvvValue').innerText = isVisible ? randomCVV : "***";
            document.getElementById('cardNum').innerText = isVisible ? "4532 8810 0021 9945" : "**** **** **** ****";
        }

        function updateName() { 
            document.getElementById('displayName').innerText = document.getElementById('cardName').value.toUpperCase() || "VOTRE NOM"; 
        }

        function openOrder() { 
            document.getElementById('modalPrice').innerText = "$" + document.getElementById('cardSelect').value + ".00"; 
            document.getElementById('orderModal').style.display = 'flex'; 
        }

        function closeOrder() { 
            document.getElementById('orderModal').style.display = 'none'; 
        }

        function updateUI() {
            let p = document.getElementById('cardSelect').value;
            document.getElementById('mainPrice').innerText = "$" + p + ".00";
            let c = document.getElementById('cardFront');
            c.style.background = (p == "25") ? "linear-gradient(135deg, #d4af37, #8a6d3b)" : (p == "30") ? "#000" : "linear-gradient(135deg, #1a3060, #0a192f)";
        }
    </script>
</body>
</html>
