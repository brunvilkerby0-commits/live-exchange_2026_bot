<div class="card-section-wrapper" style="padding: 20px; display: flex; flex-direction: column; align-items: center;">
    
    <div class="balance-display" style="margin-bottom: 20px; text-align: center;">
        <span style="color: #888; font-size: 14px;">Solde de la carte</span><br>
        <strong style="color: #d4af37; font-size: 24px;" id="card_balance">0.00 USDT</strong>
    </div>

    <div class="card-container" style="perspective: 1000px; width: 340px; height: 210px;" onclick="this.querySelector('.card-inner').classList.toggle('is-flipped')">
        <div class="card-inner" id="card_api_engine" style="position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer;">
            
            <div class="card-front" style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; background: linear-gradient(135deg, #0a192f, #162a4a); border: 1px solid rgba(212, 175, 55, 0.5); padding: 25px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                <div style="width: 50px; height: 38px; background: linear-gradient(135deg, #f0d78c, #d4af37); border-radius: 6px; margin-bottom: 25px;"></div>
                <div id="display_card_number" style="font-size: 20px; letter-spacing: 3px; color: white; margin-bottom: 20px; font-family: 'Courier New', monospace;">**** **** **** ****</div>
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div id="display_holder_name" style="color: #d4af37; text-transform: uppercase; font-size: 13px; letter-spacing: 1px;">NOM DU TITULAIRE</div>
                    <div id="display_expiry" style="color: white; font-size: 12px;">**/**</div>
                </div>
            </div>

            <div class="card-back" style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; background: #0a192f; transform: rotateY(180deg); border: 1px solid #d4af37; padding: 0;">
                <div style="width: 100%; height: 45px; background: #000; margin-top: 25px;"></div>
                <div style="margin-top: 20px; padding: 0 20px;">
                    <div style="background: #fff; color: #000; width: 60px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-left: auto;" id="display_cvv">***</div>
                    <p style="color: #888; font-size: 9px; margin-top: 10px;">Cette carte est une propriété de Live Crypto Bot. L'utilisation est soumise aux termes du contrat.</p>
                </div>
            </div>

        </div>
    </div>

    <p style="margin-top: 15px; font-size: 11px; color: #555;">Cliquez sur la carte pour voir le verso (CVV)</p>

</div>

<style>
    .is-flipped { transform: rotateY(180deg); }
</style>

<script>
    // FONKSYON POU RALE DONE NAN RENDRE/BRIDGECARD
    async function fetchCardDetails() {
        const email = localStorage.getItem('userEmail');
        if (!email) return;

        try {
            const response = await fetch(`https://live-exchange-2026-bot.onrender.com/get-card?email=${email}`);
            const data = await response.json();

            if (data.success) {
                document.getElementById('display_card_number').innerText = data.card_number;
                document.getElementById('display_holder_name').innerText = data.name;
                document.getElementById('display_cvv').innerText = data.cvv;
                document.getElementById('display_expiry').innerText = data.expiry;
                document.getElementById('card_balance').innerText = data.balance + " USDT";
            }
        } catch (err) {
            console.log("Erreur de chargement des données.");
        }
    }

    // Lè paj la louvri, rale done yo
    window.onload = fetchCardDetails;
</script>
