<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Live Crypto Bot - Cartes Virtuelles</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .container { padding: 20px; max-width: 500px; margin: auto; text-align: center; }
        
        /* DESIGN KAT LA */
        .card-box { width: 100%; height: 200px; position: relative; margin-bottom: 20px; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; padding: 20px; box-sizing: border-box; border: 1px solid var(--gold); }
        .card-front { background: linear-gradient(135deg, #1a3060, #0a192f); display: flex; flex-direction: column; justify-content: space-between; text-align: left; }
        .card-back { background: #1a1a1a; transform: rotateY(180deg); color: white; }

        /* BOUTON JE A APRE KAT LA POU L PA BLOKE */
        .eye-container { margin: 10px 0; }
        .btn-eye { background: var(--card-dark); color: var(--gold); border: 1px solid var(--gold); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-size: 18px; }

        .price-tag { font-size: 30px; color: var(--gold); font-weight: bold; margin: 20px 0; }
        
        label { display: block; text-align: left; font-size: 12px; color: var(--gold); margin-bottom: 5px; }
        input, select { width: 100%; padding: 15px; background: var(--card-dark); border: 1px solid rgba(212, 175, 55, 0.3); color: white; border-radius: 10px; margin-bottom: 20px; box-sizing: border-box; }
        
        .btn-main { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }

        /* MODAL */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:9999; }
        .modal-content { background: var(--navy); padding: 30px; border: 2px solid var(--gold); border-radius: 20px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold)">CARTES VIRTUELLES</h2>

    <div class="card-box">
        <div class="card-inner" id="cardInner" onclick="this.classList.toggle('flipped')">
            <div class="card-front" id="cardFront">
                <div style="display:flex; justify-content:space-between"><strong>VISA</strong> <i class="fab fa-cc-visa" style="font-size:30px"></i></div>
                <div id="cardNum" style="font-size:20px; letter-spacing:2px">**** **** **** ****</div>
                <div id="displayName" style="font-weight:bold">VOTRE NOM</div>
            </div>
            <div class="card-back">
                <div style="background:#000; height:35px; width:100%; margin-top:10px"></div>
                <div style="margin-top:20px">CVV: <span id="cvvValue" style="background:#fff; color:#000; padding:5px">***</span></div>
            </div>
        </div>
    </div>

    <div class="eye-container">
        <button class="btn-eye" onclick="toggleView()">
            <i id="eyeIcon" class="fas fa-eye"></i> Montrer / Cacher
        </button>
    </div>

    <div class="price-tag" id="mainPrice">$11.00</div>

    <label>NOM SUR LA CARTE</label>
    <input type="text" id="cardName" placeholder="NOM COMPLET" oninput="document.getElementById('displayName').innerText = this.value.toUpperCase() || 'VOTRE NOM'">

    <label>NIVEAU</label>
    <select id="cardSelect" onchange="updateUI()">
        <option value="11">Visa Classic ($11)</option>
        <option value="25">Visa Gold ($25)</option>
        <option value="30">Visa Black ($30)</option>
    </select>

    <button class="btn-main" onclick="document.getElementById('orderModal').style.display='flex'">COMMANDER MAINTENANT</button>
</div>

<div class="modal" id="orderModal">
    <div class="modal-content">
        <h3>Confirmer le paiement</h3>
        <p>Voulez-vous payer cette carte ?</p>
        <button class="btn-main" onclick="alert('Paiement réussi!')">OUI, PAYER</button>
        <button class="btn-main" style="background:none; color:red; margin-top:10px" onclick="document.getElementById('orderModal').style.display='none'">ANNULER</button>
    </div>
</div>

<script>
    let visible = false;
    function toggleView() {
        visible = !visible;
        document.getElementById('cardNum').innerText = visible ? "4532 8810 0021 9945" : "**** **** **** ****";
        document.getElementById('cvvValue').innerText = visible ? "123" : "***";
        document.getElementById('eyeIcon').className = visible ? "fas fa-eye-slash" : "fas fa-eye";
    }

    function updateUI() {
        let val = document.getElementById('cardSelect').value;
        document.getElementById('mainPrice').innerText = "$" + val + ".00";
        let card = document.getElementById('cardFront');
        if(val == "25") card.style.background = "linear-gradient(135deg, #d4af37, #8a6d3b)";
        else if(val == "30") card.style.background = "#000";
        else card.style.background = "linear-gradient(135deg, #1a3060, #0a192f)";
    }
</script>

</body>
</html>
