<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Kat Virtuel - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; }

        /* DESIGN KAT KI PA DEFYRE */
        .visa-card {
            width: 100%; max-width: 350px; height: 200px;
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #aa771c);
            border-radius: 15px; margin: 20px auto; padding: 20px;
            color: #443403; box-sizing: border-box; position: relative;
        }
        .card-blue { background: linear-gradient(135deg, #112240, #1a3060); color: white; }
        .card-black { background: linear-gradient(135deg, #000, #444); color: white; }

        .section { background: var(--card-dark); border-radius: 15px; padding: 20px; border: 1px solid rgba(212, 175, 55, 0.2); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #222; background: #050d1a; color: white; font-size: 16px; }
        .btn { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-opt { background: transparent; border: 1px solid var(--gold); color: var(--gold); margin-top: 10px; }
    </style>
</head>
<body>

    <h3 style="text-align: center; color: var(--gold);">MA CARTE VIRTUELLE</h3>

    <div class="visa-card" id="my-card">
        <div style="display: flex; justify-content: space-between;">
            <div style="width: 40px; height: 30px; background: rgba(0,0,0,0.1); border-radius: 4px;"></div>
            <i class="fab fa-cc-visa" style="font-size: 35px;"></i>
        </div>
        <div style="font-size: 20px; text-align: center; margin-top: 30px; font-weight: bold; letter-spacing: 2px;" id="d-num">**** **** **** ****</div>
        <div style="display: flex; justify-content: space-between; margin-top: 30px; font-size: 10px;">
            <div>TITULAIRE<br><span id="d-name" style="font-size: 12px;">VOTRE NOM</span></div>
            <div>EXP<br><span>12/28</span></div>
            <div id="cvv-box" style="display:none;">CVV<br><span id="d-cvv">***</span></div>
        </div>
    </div>

    <div id="order-ui" class="section">
        <div style="text-align: center; margin-bottom: 15px;">
            <span style="font-size: 24px; color: var(--gold); font-weight: bold;" id="price-tag">$25.00</span>
        </div>
        
        <input type="text" id="name" placeholder="Non konplè sou kat la" oninput="updateUI()">
        <input type="date" id="dob">
        <select id="level" onchange="updateUI()">
            <option value="25">Visa Gold ($25)</option>
            <option value="30">Visa Platinum ($30)</option>
            <option value="11">Visa Classic ($11)</option>
        </select>
        
        <button class="btn" onclick="buyCard()">COMMANDER & PAYER</button>
    </div>

    <div id="service-ui" class="section" style="display: none;">
        <button class="btn" onclick="showDetails()">VOIR INFOS KAT LA</button>
        <button class="btn btn-opt" onclick="openRecharge()">RECHARGER KAT LA ($3)</button>
        
        <div id="recharge-box" style="display:none; margin-top: 15px;">
            <input type="number" id="amt" placeholder="Montan ($)">
            <button class="btn" style="background: #2ecc71;" onclick="doRecharge()">KONFIME RECHAJ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const conf = { apiKey: "AIzaSyCkfT1FJmi0CM8jjs7xFhnjMrgW3yWXkpE", databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com", projectId: "live-crypto-bot" };
        const app = initializeApp(conf);
        const db = getDatabase(app);
        const user = "BK-2026"; 

        onValue(ref(db, 'users/' + user), (s) => {
            const d = s.val();
            if(d && d.hasCard) {
                document.getElementById('order-ui').style.display = 'none';
                document.getElementById('service-ui').style.display = 'block';
                document.getElementById('d-name').innerText = d.cardDetails.name;
                window.card = d.cardDetails;
                updateUI();
            }
        });

        window.buyCard = function() {
            const n = document.getElementById('name').value;
            if(!n) return alert("Mete non ou!");
            
            // Lojik: Nou voye demand lan, ou menm ou aktive l apre pèman
            push(ref(db, 'requests'), { type: 'new_card', user, name: n, level: document.getElementById('level').value });
            alert("Demann voye! Kat la ap aktive apre pèman an konfime.");
        }
    </script>

    <script>
        function updateUI() {
            const l = document.getElementById('level') ? document.getElementById('level').value : (window.card ? window.card.level : "25");
            const c = document.getElementById('my-card');
            const n = document.getElementById('name') ? document.getElementById('name').value : "";
            
            if(n) document.getElementById('d-name').innerText = n.toUpperCase();
            if(document.getElementById('price-tag')) document.getElementById('price-tag').innerText = "$" + l + ".00";

            c.className = "visa-card";
            if(l == "11") c.classList.add('card-blue');
            if(l == "30") c.classList.add('card-black');
        }

        function showDetails() {
            document.getElementById('d-num').innerText = window.card.number;
            document.getElementById('d-cvv').innerText = window.card.cvv;
            document.getElementById('cvv-box').style.display = 'block';
        }

        function openRecharge() { document.getElementById('recharge-box').style.display = 'block'; }
    </script>
</body>
</html>
