<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kòmande Kat - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-bg: #112240; --white: #ffffff; --red: #ff4d4d; }
        body { background: var(--navy); color: var(--white); font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; display: flex; justify-content: center; }
        .main-container { width: 100%; max-width: 450px; text-align: center; }
        h2 { color: var(--gold); text-transform: uppercase; font-size: 18px; margin-bottom: 25px; }

        /* DESIGN KAT YO */
        .plans-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .visual-card {
            width: 100%; height: 170px; border-radius: 15px; padding: 20px; box-sizing: border-box; cursor: pointer;
            transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
        }
        .visual-card:hover { transform: scale(1.02); filter: brightness(1.1); }
        .card-standard { background: linear-gradient(135deg, #2c3e50, #000000); border: 1px solid #555; }
        .card-premium { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); color: #000; }
        .card-vip { background: linear-gradient(135deg, #000, #1a1a1a); border: 1px solid var(--gold); }
        .plan-name { font-size: 18px; font-weight: 800; }
        .price-tag { font-size: 20px; font-weight: 900; align-self: flex-end; }

        /* FORMILÈ AK MESAJ */
        #form-container { display: none; background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: left; border-top: 4px solid var(--gold); margin-top: 15px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--gold); margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0a192f; color: white; box-sizing: border-box; outline: none; }
        
        /* MESAJ ERÈ */
        .error-box { display: none; background: rgba(255, 77, 77, 0.15); color: var(--red); padding: 12px; border-radius: 8px; border: 1px solid var(--red); font-size: 13px; margin-bottom: 15px; text-align: center; font-weight: bold; }

        /* KYC */
        .kyc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .file-box { border: 1px dashed var(--gold); padding: 12px; text-align: center; border-radius: 10px; cursor: pointer; background: rgba(212, 175, 55, 0.05); }
        .file-label { font-size: 10px; color: white; display: block; margin-top: 5px; }

        .btn-submit { background: var(--gold); color: var(--navy); border: none; padding: 16px; width: 100%; border-radius: 30px; font-weight: 900; margin-top: 20px; cursor: pointer; text-transform: uppercase; font-size: 14px; }
    </style>
</head>
<body>

<div class="main-container">
    <h2 id="page-title">Chwazi modèl kat ou</h2>

    <div id="plans-section" class="plans-wrapper">
        <div class="visual-card card-standard" onclick="prepareForm('Standard', 15)">
            <div class="plan-name">STANDARD</div><div class="price-tag">15 USDT</div>
        </div>
        <div class="visual-card card-premium" onclick="prepareForm('Premium Gold', 19)">
            <div class="plan-name">PREMIUM GOLD</div><div class="price-tag">19 USDT</div>
        </div>
        <div class="visual-card card-vip" onclick="prepareForm('VIP Luxury', 20)">
            <div class="plan-name" style="color: var(--gold);">VIP LUXURY</div><div class="price-tag" style="color: var(--gold);">20 USDT</div>
        </div>
    </div>

    <div id="form-container">
        <div id="msg-error" class="error-box">
            <i class="fas fa-times-circle"></i> Solde insuffisant. Tanpri rechaje kont ou anvan.
        </div>

        <p style="font-size: 12px; text-align: center; margin-bottom: 15px;">Kat: <b id="show-plan" style="color: var(--gold);"></b></p>
        
        <form id="orderForm">
            <div class="input-group"><label>Nom konplè</label><input type="text" id="fullname" placeholder="Jan ou wè l sou ID w" required></div>
            
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;"><label>Peyi</label>
                    <select id="country" onchange="changeCode()">
                        <option value="HT" data-code="+509">Haïti</option>
                        <option value="CA" data-code="+1">Canada</option>
                        <option value="US" data-code="+1">USA</option>
                        <option value="DR" data-code="+1-809">Rép. Dom.</option>
                    </select>
                </div>
                <div style="flex: 1.5;"><label>Telefòn</label><input type="text" id="phone" value="+509 "></div>
            </div>

            <label>Foto Dokiman ID</label>
            <div class="kyc-grid">
                <div class="file-box" onclick="document.getElementById('f1').click()">
                    <i class="fas fa-camera"></i><span class="file-label" id="l1">Devan ID</span>
                    <input type="file" id="f1" hidden accept="image/*" onchange="mark(this, 'l1')">
                </div>
                <div class="file-box" onclick="document.getElementById('f2').click()">
                    <i class="fas fa-camera"></i><span class="file-label" id="l2">Dèyè ID</span>
                    <input type="file" id="f2" hidden accept="image/*" onchange="mark(this, 'l2')">
                </div>
            </div>

            <button type="button" class="btn-submit" onclick="submitFinal()">Peye & Kòmande</button>
        </form>
    </div>
</div>

<script>
    let currentPrice = 0;
    // N ap sipoze balans kliyan an se 10 pou kounye a (Tès)
    let userBalance = 10; 

    function prepareForm(name, p) {
        currentPrice = p;
        document.getElementById('plans-section').style.display = 'none';
        document.getElementById('form-container').style.display = 'block';
        document.getElementById('page-title').innerText = "Enfòmasyon Aktivasyon";
        document.getElementById('show-plan').innerText = name + " (" + p + " USDT)";
    }

    function changeCode() {
        const sel = document.getElementById('country');
        const code = sel.options[sel.selectedIndex].getAttribute('data-code');
        document.getElementById('phone').value = code + " ";
    }

    function mark(input, id) {
        if(input.files[0]) { document.getElementById(id).innerText = "✅ Chaje"; }
    }

    function submitFinal() {
        const errorMsg = document.getElementById('msg-error');
        
        // 1. Tcheke si li gen kòb ase
        if (userBalance < currentPrice) {
            errorMsg.style.display = 'block';
            window.scrollTo(0, 0); // Fè paj la moute anlè pou l wè erè a
            return;
        }

        // 2. Tcheke si li mete non l
        if (!document.getElementById('fullname').value) {
            alert("Tanpri mete non ou.");
            return;
        }

        // Si tout bagay bon:
        errorMsg.style.display = 'none';
        alert("Pèman validé! N ap voye enfòmasyon yo kounye a.");
        
        // Redireksyon
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
    }
</script>
</body>
</html>
