<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Vérification KYC - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card: #112240; --text: #ccd6f6; --green: #2ecc71; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .container { max-width: 500px; margin: 0 auto; }
        h2 { color: var(--gold); text-align: center; text-transform: uppercase; font-size: 18px; margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--gold); margin-bottom: 5px; }
        input, select { 
            width: 100%; padding: 12px; background: var(--card); border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 10px; color: white; outline: none; box-sizing: border-box;
        }

        /* UPLOAD PHOTO ID */
        .upload-box {
            background: var(--card); border: 2px dashed rgba(212, 175, 55, 0.3);
            padding: 20px; border-radius: 15px; text-align: center; margin-top: 15px;
        }
        .upload-box i { font-size: 24px; color: var(--gold); }
        .upload-box p { font-size: 11px; margin: 10px 0; }
        .file-input { display: none; }
        .btn-select { background: var(--gold); color: var(--navy); padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }

        /* LIVE SELFIE SECTION */
        .selfie-container {
            margin-top: 25px; position: relative; text-align: center;
        }
        #video-preview {
            width: 250px; height: 250px; border-radius: 50%; object-fit: cover;
            border: 5px solid var(--card); box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #000;
        }
        .face-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; border: 2px dashed rgba(255,255,255,0.3); border-radius: 50%;
            pointer-events: none;
        }
        .status-msg { font-size: 12px; margin-top: 10px; font-weight: bold; }
        .status-good { color: var(--green); }
        .status-bad { color: #ff4d4d; }

        .btn-capture {
            background: var(--gold); color: var(--navy); border: none; padding: 15px;
            width: 100%; border-radius: 12px; font-weight: bold; margin-top: 30px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Vérification d'identité</h2>

    <div class="input-group">
        <label>PRÉNOM</label>
        <input type="text" id="prenom" placeholder="Ex: Brunvil">
    </div>

    <div class="input-group">
        <label>NOM</label>
        <input type="text" id="nom" placeholder="Ex: Kerby">
    </div>

    <div class="input-group">
        <label>TYPE DE DOCUMENT</label>
        <select id="doc-type">
            <option value="cin">Carte d'Identité (CIN)</option>
            <option value="passeport">Passeport</option>
        </select>
    </div>

    <div class="upload-box">
        <i class="fas fa-id-card"></i>
        <p>Télécharger le <b>Recto</b> (Devant)</p>
        <label for="file-recto" class="btn-select">Choisir Photo</label>
        <input type="file" id="file-recto" class="file-input" accept="image/*">
    </div>

    <div class="upload-box">
        <i class="fas fa-id-badge"></i>
        <p>Télécharger le <b>Verso</b> (Deyè)</p>
        <label for="file-verso" class="btn-select">Choisir Photo</label>
        <input type="file" id="file-verso" class="file-input" accept="image/*">
    </div>

    <div class="selfie-container">
        <label style="margin-bottom: 15px;">SCANNER VOTRE VISAGE (LIVE)</label>
        <div style="position: relative; display: inline-block;">
            <video id="video-preview" autoplay playsinline></video>
            <div class="face-overlay" id="overlay"></div>
        </div>
        <div id="status" class="status-msg status-bad">Veuillez bien centrer votre visage</div>
    </div>

    <button class="btn-capture" onclick="submitKYC()">SOUMETTRE LE KYC</button>
</div>

<script>
    const video = document.getElementById('video-preview');
    const statusText = document.getElementById('status');
    const overlay = document.getElementById('overlay');

    // Limen Kamera a otomatikman
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            
            // Simulation ti deteksyon "Live"
            setInterval(() => {
                // Isit la nou simulation lojik pozisyon an
                // Nan vèsyon AI avanse, nou t ap tcheke piksèl yo
                statusText.innerText = "VISAGE BIEN POSITIONNÉ ✓";
                statusText.className = "status-msg status-good";
                overlay.style.borderColor = "var(--green)";
            }, 3000);

        } catch (err) {
            statusText.innerText = "Erreur: Kamera a pa ka ouvri";
            console.error(err);
        }
    }

    function submitKYC() {
        alert("Enregistrement en cours... Vos données sont envoyées à l'administrateur.");
        window.location.href = "dashboard.html";
    }

    startCamera();
</script>

</body>
</html>
