<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exchange - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue-pro: #0063e5; --navy: #0a192f; --card-dark: #112240; --gold: #d4af37; --text: #ccd6f6; --green: #2ecc71; --red: #e74c3c; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--navy); font-family: 'Segoe UI', sans-serif; color: white; }

        .main-wrapper { display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; position: relative; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--gold); font-size: 24px; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .back-btn { position: absolute; top: 20px; left: 20px; color: var(--gold); text-decoration: none; font-size: 20px; }

        .exchange-card { 
            background: var(--card-dark); width: 100%; max-width: 400px; 
            padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); box-sizing: border-box;
        }

        .taux-box { 
            background: rgba(0, 99, 229, 0.1); border: 1px solid var(--blue-pro);
            padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 25px;
        }
        .taux-box p { margin: 5px 0; font-size: 12px; color: var(--text); }
        .taux-box strong { color: var(--gold); font-size: 16px; }

        .input-group { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 18px; margin-bottom: 10px; border: 1px solid transparent; transition: 0.3s; }
        .input-group:focus-within { border-color: var(--blue-pro); }
        .input-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 11px; color: var(--text); font-weight: bold; }
        
        .input-row { display: flex; align-items: center; }
        .input-row input { background: none; border: none; color: white; font-size: 22px; width: 70%; outline: none; font-weight: bold; }
        .currency-tag { background: var(--blue-pro); padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 900; width: 30%; text-align: center; }

        .swap-btn { 
            width: 40px; height: 40px; background: var(--navy); border: 2px solid var(--blue-pro);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: -20px auto 10px auto; cursor: pointer; z-index: 10; position: relative;
            color: var(--gold); transition: 0.3s;
        }

        .btn-exchange { 
            width: 100%; padding: 18px; background: var(--blue-pro); color: white; 
            border: none; border-radius: 15px; font-weight: 900; font-size: 16px;
            cursor: pointer; margin-top: 20px; text-transform: uppercase;
            display: flex; justify-content: center; align-items: center;
        }
        .btn-exchange:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }

        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 8px; color: white; font-weight: bold; display: none; z-index: 100; font-size: 13px; text-align: center; min-width: 250px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        
        .loader { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; animation: spin 1s linear infinite; display: none; margin-left: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="custom-alert"></div>

<div class="main-wrapper">
    <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>

    <div class="header">
        <h1>Échange d'argent</h1>
        <p style="font-size: 12px; opacity: 0.7;">Live Crypto Bot System</p>
    </div>

    <div class="exchange-card">
        <div class="taux-box">
            <p>Taux de vente: 1 USDT = <strong>145.00 HTG</strong></p>
            <p>Taux d'achat: 1 USDT = <strong>138.00 HTG</strong></p>
        </div>

        <div class="input-group">
            <div class="input-header"><span>ÉCHANGE DEPUIS</span><span id="bal-from">Solde: Chaje...</span></div>
            <div class="input-row">
                <input type="number" id="input-from" placeholder="0.00">
                <div class="currency-tag" id="tag-from">HTG</div>
            </div>
        </div>

        <div class="swap-btn" id="btn-swap"><i class="fas fa-retweet"></i></div>

        <div class="input-group">
            <div class="input-header"><span>ÉCHANGE VERS</span><span id="bal-to">Solde: Chaje...</span></div>
            <div class="input-row">
                <input type="number" id="input-to" placeholder="0.00" readonly>
                <div class="currency-tag" id="tag-to" style="background: var(--gold); color: black;">USDT</div>
            </div>
        </div>

        <p id="fee-text" style="font-size: 10px; text-align: center; color: var(--text); margin-top: 10px;">Frais de transaction: 0% (Inclus dans le taux)</p>

        <button class="btn-exchange" id="btn-submit">
            <span>Échanger l'argent</span>
            <div class="loader" id="main-loader"></div>
        </button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCkfT1FJmi0CM8jjs7xFhnjMrgW3yWXkpE",
        authDomain: "live-crypto-bot.firebaseapp.com",
        projectId: "live-crypto-bot",
        databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com",
        appId: "1:583419008753:web:f4b8389ace26d7e5bf7b50"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 🔄 DETEKSYON KLIYAN OTOMATIK (DINAMIK)
    const userID = localStorage.getItem('userID') || sessionStorage.getItem('userID') || "BK-2026";
    const username = localStorage.getItem('username') || "Kliyan VIP";

    const botToken = "8650927753:AAENrCiVGi4m89bDj7fVz15Ax7nDUVnEYlc"; 
    const chatID = "8118891270";

    let mode = "HTG_TO_USDT";
    const tauxVente = 145; 
    const tauxAchat = 138;
    let userBalances = { HTG: 0, USDT: 0 };

    // 📥 Koute balans kliyan an an tan reyèl nan Firebase
    onValue(ref(db, 'users/' + userID), (snapshot) => {
        const data = snapshot.val();
        if (data) {
            userBalances.HTG = data.balanceHTG || 0;
            userBalances.USDT = data.balanceUSDT || 0;
            updateBalanceUI();
        }
    });

    function updateBalanceUI() {
        if (mode === "HTG_TO_USDT") {
            document.getElementById('bal-from').innerText = `Solde: ${userBalances.HTG.toFixed(2)} HTG`;
            document.getElementById('bal-to').innerText = `Solde: ${userBalances.USDT.toFixed(2)} USDT`;
        } else {
            document.getElementById('bal-from').innerText = `Solde: ${userBalances.USDT.toFixed(2)} USDT`;
            document.getElementById('bal-to').innerText = `Solde: ${userBalances.HTG.toFixed(2)} HTG`;
        }
        calculate();
    }

    function showAlert(msg, type) {
        const alertBox = document.getElementById('custom-alert');
        alertBox.innerText = msg;
        alertBox.style.background = type === 'success' ? 'var(--green)' : 'var(--red)';
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
    }

    window.swap = function() {
        const fromTag = document.getElementById('tag-from');
        const toTag = document.getElementById('tag-to');

        if (mode === "HTG_TO_USDT") {
            mode = "USDT_TO_HTG";
            fromTag.innerText = "USDT"; toTag.innerText = "HTG";
            fromTag.style.background = "var(--gold)"; fromTag.style.color = "black";
            toTag.style.background = "var(--blue-pro)"; toTag.style.color = "white";
        } else {
            mode = "HTG_TO_USDT";
            fromTag.innerText = "HTG"; toTag.innerText = "USDT";
            fromTag.style.background = "var(--blue-pro)"; fromTag.style.color = "white";
            toTag.style.background = "var(--gold)"; toTag.style.color = "black";
        }
        document.getElementById('input-from').value = "";
        document.getElementById('input-to').value = "";
        updateBalanceUI();
    }

    window.calculate = function() {
        const val = parseFloat(document.getElementById('input-from').value);
        const output = document.getElementById('input-to');
        if (isNaN(val) || val <= 0) { output.value = ""; return; }
        output.value = (mode === "HTG_TO_USDT") ? (val / tauxVente).toFixed(2) : (val * tauxAchat).toFixed(2);
    }

    window.processExchange = function() {
        const val = parseFloat(document.getElementById('input-from').value);
        const outputVal = parseFloat(document.getElementById('input-to').value);
        const currentBalFrom = (mode === "HTG_TO_USDT") ? userBalances.HTG : userBalances.USDT;

        if (isNaN(val) || val <= 0) {
            showAlert("Tanpri antre yon montan valid!", "error");
            return;
        }

        if (val > currentBalFrom) {
            showAlert("Ou pa gen ase kòb nan balans ou!", "error");
            return;
        }

        document.getElementById('main-loader').style.display = "block";
        document.getElementById('btn-submit').disabled = true;

        // 🧮 Kalkile nouvo balans yo
        let newBalanceHTG = userBalances.HTG;
        let newBalanceUSDT = userBalances.USDT;

        if (mode === "HTG_TO_USDT") {
            newBalanceHTG = userBalances.HTG - val;
            newBalanceUSDT = userBalances.USDT + outputVal;
        } else {
            newBalanceUSDT = userBalances.USDT - val;
            newBalanceHTG = userBalances.HTG + outputVal;
        }

        // 🔄 1. Mete balans yo ajou nan Firebase otomatikman
        update(ref(db, 'users/' + userID), {
            balanceHTG: newBalanceHTG,
            balanceUSDT: newBalanceUSDT
        }).then(() => {
            
            // 🔔 2. Voye mesaj notifikasyon sou Telegram bay Admin an
            const currencyFrom = mode.split('_')[0];
            const currencyTo = mode.split('_')[2];
            const message = `🔄 *NOTIFIKASYON ECHANJ VA REYÈL*\n\n👤 *Kliyan:* ${username}\n🆔 *ID Kliyan:* \`${userID}\`\n📉 *Depans:* ${val.toFixed(2)} ${currencyFrom}\n📈 *Resevwa:* ${outputVal.toFixed(2)} ${currencyTo}\n\n⚙️ *Sistèm:* Live Crypto Bot (Balans Mizajou) ✅`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatID, text: message, parse_mode: 'Markdown' })
            }).then(() => {
                document.getElementById('main-loader').style.display = "none";
                document.getElementById('btn-submit').disabled = false;
                showAlert("Échange effectué avec succès! 🎉", "success");
                document.getElementById('input-from').value = "";
                document.getElementById('input-to').value = "";
            });
        }).catch(() => {
            document.getElementById('main-loader').style.display = "none";
            document.getElementById('btn-submit').disabled = false;
            showAlert("Erè nan pwosesis echanj lan. Reseye.", "error");
        });
    }

    // Atache evènman yo ak dom lan piske script la se yon modil kounye a
    document.getElementById('btn-swap').addEventListener('click', window.swap);
    document.getElementById('input-from').addEventListener('input', window.calculate);
    document.getElementById('btn-submit').addEventListener('click', window.processExchange);
</script>
</body>
</html>
